<!DOCTYPE html>
<html>

<head>
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f1f3f6;">

    <div class="container mt-5">

        <h1 class="mb-4">🛍 Checkout</h1>

        <div class="row">

            <div class="col-md-7">

                <div class="card shadow border-0 p-4">

                    <h3>Delivery Details</h3>

                    <form method="POST" action="/payment/">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="name" class="form-control" pattern="[A-Za-z ]+"
                                title="Please enter letters only" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <textarea name="address" class="form-control" rows="4" minlength="10"
                                title="Please enter a valid address" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" name="phone" class="form-control" pattern="[0-9]{10}" maxlength="10"
                                title="Please enter a valid 10-digit phone number" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">City</label>
                            <input type="text" name="city" class="form-control" pattern="[A-Za-z ]+"
                                title="Please enter letters only" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">State</label>
                            <input type="text" name="state" class="form-control" pattern="[A-Za-z ]+"
                                title="Please enter letters only" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Pincode</label>
                            <input type="text" name="pincode" class="form-control" pattern="[0-9]{6}" maxlength="6"
                                title="Please enter a valid 6-digit pincode" required>
                        </div>

                        <button type="submit" class="btn btn-success btn-lg">
                            Proceed To Payment
                        </button>
                    </form>

                </div>

            </div>

            <div class="col-md-5">

                <div class="card shadow border-0 p-4">

                    <h3>Order Summary</h3>

                    <hr>

                    {% for item in cart_items %}
                    <div class="mb-3">
                        <strong>{{ item.product.name }}</strong>
                        <br>
                        ₹{{ item.product.price }} × {{ item.quantity }}
                    </div>
                    {% endfor %}

                    <hr>

                    <h3 class="text-success">
                        Total: ₹{{ total_price }}
                    </h3>

                </div>

            </div>

        </div>

        <br>

        <a href="/cart/" class="btn btn-secondary">
            Back To Cart
        </a>

    </div>

</body>

</html>
