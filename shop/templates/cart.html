<!DOCTYPE html>
<html>

<head>
    <title>My Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f1f3f6;">

    <div class="container mt-5">

        <h1 class="mb-4">🛒 My Cart</h1>

        {% for item in cart_items %}

        <div class="card shadow-sm mb-3">
            <div class="card-body">

                <h4>{{ item.product.name }}</h4>

                <h5 class="text-success">
                    ₹{{ item.product.price }}
                </h5>

                <p>
                    Quantity: {{ item.quantity }}
                </p>

                <a href="/increase-quantity/{{ item.id }}/" class="btn btn-success btn-sm">
                    +
                </a>

                <a href="/decrease-quantity/{{ item.id }}/" class="btn btn-warning btn-sm">
                    -
                </a>

                <a href="/remove-from-cart/{{ item.id }}/" class="btn btn-danger btn-sm">
                    Remove
                </a>

            </div>
        </div>

        {% empty %}
        <div class="alert alert-info">
            Your cart is empty.
        </div>
        {% endfor %}

        <div class="card shadow p-3 mt-4">
            <h3>Total: ₹{{ total_price }}</h3>

            <a href="/checkout/" class="btn btn-primary">
                Proceed to Checkout
            </a>
        </div>

        <br>

        <a href="/" class="btn btn-secondary">
            Back Home
        </a>

    </div>

</body>

</html>
